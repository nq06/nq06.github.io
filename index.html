<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宁蔷</title>
  <link rel="stylesheet" href="css/font.css">
  <script src="js/animation.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* 自适应五宫格布局核心 */
    .container {
      display: grid;
      grid-template-areas:
        "  .   游戏   .  "
        "小说 游戏 绘画"
        "小说  .   绘画"
        "动画  .   随笔"
        "动画  .   随笔";
      gap: clamp(15px, 4vw, 30px);
      width: 100%;
      max-width: 900px;
    }

    /* 卡片通用样式 */
    .card {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Source Han Serif CN-Heavy";
      font-weight: 900;
      font-size: clamp(32px, 8vw, 64px);
      box-shadow: 6px 6px 6px rgba(0, 0, 0, 0.25);
      border: 1px solid #000;
      position: relative;
    }

    /* 五个模块位置 + 颜色 */
    .novel {
      grid-area: 小说;
      background: rgba(202, 192, 153, 1);
    }
    .painting {
      grid-area: 绘画;
      background: rgba(182, 105, 106, 0.2);
    }
    .game {
      grid-area: 游戏;
      background: rgba(143, 47, 46, 1);
      color: #000;
    }
    .animation {
      grid-area: 动画;
      background: rgba(228, 106, 40, 1);
    }
    .essay {
      grid-area: 随笔;
      background: rgba(145, 162, 166, 1);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card novel">小说</div>
    <div class="card painting">绘画</div>
    <div class="card game">游戏</div>
    <div class="card animation">动画</div>
    <div class="card essay">随笔</div>
  </div>
</body>
</html>
